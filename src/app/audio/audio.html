<div class="tab-view">
    <div class="tab-header">
        <div class="tab-icon">🎵</div>
        <h1>Audio</h1>
        <p>Konwersja i przetwarzanie plików audio</p>
    </div>

    <div class="tab-content">
        <div class="upload-area" (click)="fileInput.click()" (dragover)="onDragOver($event)" (drop)="onDrop($event)">
            <input #fileInput type="file" accept="audio/*" hidden (change)="onFileSelected($event)" />
            @if (selectedFile()) {
            <button class="btn-remove" (click)="removeFile($event)" title="Usuń plik">✕</button>
            }
            <div class="upload-icon">🎧</div>
            @if (selectedFile()) {
            <p class="file-name">{{ selectedFile()!.name }}</p>
            <p class="file-size">{{ (selectedFile()!.size / 1024).toFixed(1) }} KB</p>
            } @else {
            <p>Przeciągnij plik audio tutaj lub kliknij, aby wybrać</p>
            }
            <button class="btn-primary">Wybierz plik</button>
        </div>
    </div>
</div>
