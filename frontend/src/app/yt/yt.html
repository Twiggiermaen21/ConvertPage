<div class="tab-view">
    <div class="tab-header">
        <div class="tab-icon">▶️</div>
        <h1>YouTube</h1>
        <p>Pobieranie i przetwarzanie filmów z YouTube</p>
    </div>

    <div class="tab-content">
        <div class="url-input-area">
            <label for="ytUrl">Wklej link do filmu YouTube</label>
            <div class="input-group">
                <input type="url" id="ytUrl" placeholder="https://www.youtube.com/watch?v=..." [value]="url()"
                    (input)="onUrlChange($event)" [disabled]="isProcessing()" />
                <button class="btn-primary" (click)="download()" [disabled]="isProcessing() || !url()">
                    @if (isProcessing()) { ⏳ Pobieranie... ({{ elapsedSeconds() }}s) } @else { Pobierz }
                </button>
            </div>
        </div>
    </div>
</div>
