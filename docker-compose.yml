name: pdf-yt-audio

services:
  redis:
    container_name: pdf-yt-audio-redis
    image: redis:latest
    ports:
      # Zewnętrzny (Windows): 16379 | Wewnętrzny (Docker): 6379
      - "16379:6379"

  api:
    container_name: pdf-yt-audio-api
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      # Zewnętrzny (Windows): 8090 | Wewnętrzny (Docker): 8000
      - "8090:8000"
    volumes:
      - .:/backend
    environment:
      # UWAGA: Tu zostaje 6379, bo wewnątrz swojej sieci kontenery komunikują się po portach wewnętrznych!
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    depends_on:
      - redis

  worker:
    container_name: pdf-yt-audio-worker
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/backend
      - ./temp_workspace:/backend/temp_workspace
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    depends_on:
      - redis